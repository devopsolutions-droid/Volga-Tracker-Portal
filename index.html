<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Volga Infosys - Engine VR Tracker Login</title>
<link rel="icon" href="favicon.png" type="image/png">
<!-- Google Fonts: Plus Jakarta Sans -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Firebase App and Firestore Compatibility SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
    :root {
        --primary:       #3b82f6;
        --primary-hover: #2563eb;
        --dark:          #1e293b;
        --page-bg:       #f0f4f8;
        --card-bg:       #ffffff;
        --text-main:     #334155;
        --text-muted:    #64748b;
        --border:        #e2e8f0;
        --shadow-sm:     0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        --shadow-md:     0 4px 20px rgba(0,0,0,0.08);
        --shadow-lg:     0 12px 40px rgba(0,0,0,0.10);
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        padding: 16px;
        font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
        background-color: var(--page-bg);
        background-image:
            linear-gradient(135deg, rgba(2, 6, 23, 0.72), rgba(15, 23, 42, 0.28)),
            url("BG Image.png");
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: var(--text-main);
    }

    /* ── Login Card ── */
    .login-box {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
        padding: 40px 36px 32px;
        width: 100%;
        max-width: 420px;
        border: 1px solid rgba(226, 232, 240, 0.8);
        border-top: 4px solid var(--primary);
        animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(22px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Brand Header ── */
    .login-header {
        text-align: center;
        margin-bottom: 28px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
    }

    .brand-container {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .brand-text {
        font-weight: 800;
        font-size: 1.6rem;
        letter-spacing: 0.3px;
        margin: 0;
        line-height: 1;
    }

    .volga-text   { color: #0B3A5E; }
    .infosys-text {
        background: linear-gradient(90deg, #F05A28 0%, #F39C12 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
    }

    .login-subtitle {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--text-muted);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin: 0;
    }

    /* ── Tabs ── */
    .tabs {
        display: flex;
        margin-bottom: 24px;
        background: var(--page-bg);
        border-radius: 10px;
        padding: 4px;
        border: 1px solid var(--border);
    }

    .tab {
        flex: 1;
        text-align: center;
        padding: 10px;
        cursor: pointer;
        border-radius: 7px;
        font-weight: 700;
        color: var(--text-muted);
        font-size: 0.88rem;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        user-select: none;
    }

    .tab.active {
        background: var(--dark);
        color: #ffffff;
        box-shadow: var(--shadow-sm);
    }

    /* ── Input Groups ── */
    .input-group {
        margin-bottom: 18px;
        text-align: left;
    }

    .input-group label {
        display: block;
        font-size: 0.72rem;
        color: var(--text-muted);
        margin-bottom: 6px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .input-group input {
        width: 100%;
        padding: 10px 14px;
        background: var(--page-bg);
        border: 1.5px solid var(--border);
        border-radius: 8px;
        color: var(--text-main);
        font-size: 0.92rem;
        outline: none;
        font-family: inherit;
        transition: all 0.2s;
    }

    .input-group input:focus {
        border-color: var(--primary);
        background: #fff;
        box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    /* ── Login Button (neumorphic, matches dashboard) ── */
    .btn-login {
        width: 100%;
        height: 44px;
        background: var(--primary);
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        box-shadow: 0 4px 0 color-mix(in srgb, var(--primary) 75%, #000);
        position: relative;
        top: 0;
        transition: all 0.1s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn-login:hover {
        background: var(--primary-hover);
        box-shadow: 0 4px 0 color-mix(in srgb, var(--primary-hover) 75%, #000);
    }

    .btn-login:active {
        top: 4px;
        box-shadow: 0 0px 0 transparent;
    }

    /* ── Error Message ── */
    .error-msg {
        font-size: 0.82rem;
        text-align: center;
        margin-top: -8px;
        margin-bottom: 16px;
        display: none;
        font-weight: 600;
        color: #991b1b;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-left: 4px solid #ef4444;
        padding: 10px 12px;
        border-radius: 8px;
    }

    /* ── Password Toggle ── */
    .password-toggle-btn {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        outline: none;
        transition: color 0.2s;
    }
    .password-toggle-btn:hover { color: var(--primary); }

    /* ── Footer ── */
    .login-footer {
        margin-top: 22px;
        text-align: center;
        font-size: 0.78rem;
        color: #94a3b8;
        border-top: 1px solid var(--border);
        padding-top: 16px;
    }

    /* ── Page footer below card ── */
    .page-footer {
        margin-top: 20px;
        font-size: 0.75rem;
        color: #94a3b8;
        text-align: center;
    }

    @media (max-width: 480px) {
        .login-box { padding: 28px 20px 22px; }
        .brand-text { font-size: 1.4rem; }
        .tab { padding: 9px 5px; font-size: 0.82rem; }
        .input-group { margin-bottom: 14px; }
    }
</style>
</head>
<body>

<div class="login-box">
    <div class="login-header">
        <div class="brand-container">
            <img src="favicon.png" alt="Volga Infosys Logo" style="width: 30px; height: 30px; object-fit: contain;">
            <h1 class="brand-text"><span class="volga-text">VOLGA</span><span class="infosys-text">INFOSYS</span></h1>
        </div>
        <p class="login-subtitle">Project Tracker Portal</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('user')" id="tab-user">User Login</div>
        <div class="tab" onclick="switchTab('admin')" id="tab-admin">Admin Login</div>
    </div>

    <div id="error" class="error-msg">Invalid Credentials</div>

    <div class="input-group">
        <label id="userid-label" for="userid">User ID</label>
        <input type="text" id="userid" placeholder="Enter your User ID" autocomplete="off">
    </div>

    <div class="input-group" id="pass-group" style="display: none;">
        <label for="pass">Password</label>
        <div style="position: relative;">
            <input type="password" id="pass" placeholder="Enter Admin Password" style="padding-right: 40px;">
            <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility()" title="Toggle Password Visibility">
                <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </button>
        </div>
    </div>

    <button class="btn-login" onclick="login()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
            <polyline points="10 17 15 12 10 7"></polyline>
            <line x1="15" y1="12" x2="3" y2="12"></line>
        </svg>
        Enter Dashboard
    </button>

    <div class="login-footer">
        &copy; 2026 Volga Infosys Private Limited. All rights reserved.
    </div>
</div>

<p class="page-footer" style="color: #ffffff;">Secure Portal &bull; Engine VR Project Management</p>

<script>
    // 1. Session check (auto-bypass login if already logged in)
    if (sessionStorage.getItem('loggedIn') === 'true') {
        window.location.href = 'dashboard.html';
    }

    // 2. Firebase Configuration - REPLACE WITH YOUR KEYS
    const firebaseConfig = {
      apiKey: "AIzaSyAKHrg6tNkdpnqU8a9r1DKs8oH4IvZcE04",
      authDomain: "enginevr-tracker.firebaseapp.com",
      projectId: "enginevr-tracker",
      storageBucket: "enginevr-tracker.firebasestorage.app",
      messagingSenderId: "538833317729",
      appId: "1:538833317729:web:326cf15f20c90a004ddf20",
      measurementId: "G-MC66PB301E"
    };

    // Initialize Firebase
    let db = null;
    if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
        } catch (e) {
            console.error("Firebase initialization failed:", e);
        }
    }

    // 3. Unified Database Layer
    const dbHelper = {
        async getUsers() {
            if (db) {
                try {
                    const snapshot = await db.collection('users').get();
                    return snapshot.docs.map(doc => ({ id: doc.id, displayName: doc.data().displayName || doc.id, role: doc.data().role || 'user' }));
                } catch (e) {
                    console.error("Firestore read failed, falling back to LocalStorage:", e);
                }
            }
            const storedUsers = localStorage.getItem('engineTrackerUsers');
            const raw = storedUsers ? JSON.parse(storedUsers) : [];
            return raw.map(u => typeof u === 'string' ? { id: u, displayName: u, role: 'user' } : { role: 'user', ...u });
        }
    };

    let currentRole = 'user';

    function switchTab(role) {
        currentRole = role;
        document.getElementById('error').style.display = 'none';
        document.getElementById('userid').value = '';
        document.getElementById('pass').value = '';

        if (role === 'admin') {
            document.getElementById('tab-admin').classList.add('active');
            document.getElementById('tab-user').classList.remove('active');
            document.getElementById('pass-group').style.display = 'block';
            document.getElementById('userid-label').innerText = 'Admin User ID';
            document.getElementById('userid').placeholder = 'Enter Admin User ID';
        } else {
            document.getElementById('tab-user').classList.add('active');
            document.getElementById('tab-admin').classList.remove('active');
            document.getElementById('pass-group').style.display = 'none';
            document.getElementById('userid-label').innerText = 'User ID';
            document.getElementById('userid').placeholder = 'Enter your User ID';
        }
    }

    async function login() {
        const userid = document.getElementById('userid').value.trim();
        const pass = document.getElementById('pass').value;
        const errorEl = document.getElementById('error');

        if (!userid) {
            errorEl.innerText = "Please enter your User ID";
            errorEl.style.display = 'block';
            return;
        }

        if (currentRole === 'admin') {
            if (userid === 'adminvolga' && pass === 'enginevradmin') {
                sessionStorage.setItem('loggedIn', 'true');
                sessionStorage.setItem('role', 'admin');
                sessionStorage.setItem('username', 'ADMIN');
                sessionStorage.setItem('userid', 'adminvolga');
                
                window.location.href = 'dashboard.html';
            } else {
                errorEl.innerText = "Invalid Admin Credentials";
                errorEl.style.display = 'block';
            }
        } else {
            // General User Login — match against private User ID
            try {
                const authUsers = await dbHelper.getUsers();
                const match = authUsers.find(u => u.id === userid);
                if (match) {
                    sessionStorage.setItem('loggedIn', 'true');
                    sessionStorage.setItem('role', match.role || 'user');
                    // Store the Display Name (not the User ID) for use in the tracker
                    sessionStorage.setItem('username', match.displayName);
                    sessionStorage.setItem('userid', match.id);
                    
                    window.location.href = 'dashboard.html';
                } else {
                    errorEl.innerText = "Invalid User ID. Please contact an Admin.";
                    errorEl.style.display = 'block';
                }
            } catch (e) {
                console.error("Login verification failed:", e);
                errorEl.innerText = "Login error. Please try again.";
                errorEl.style.display = 'block';
            }
        }
    }

    // Allow pressing Enter to login
    document.addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            login();
        }
    });

    function togglePasswordVisibility() {
        const passInput = document.getElementById('pass');
        const eyeIcon = document.getElementById('eye-icon');
        if (passInput.type === 'password') {
            passInput.type = 'text';
            eyeIcon.innerHTML = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
            `;
        } else {
            passInput.type = 'password';
            eyeIcon.innerHTML = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            `;
        }
    }
</script>

</body>
</html>
