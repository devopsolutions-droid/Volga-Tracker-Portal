<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Volga Infosys - Engine VR Tracker Login</title>
<link rel="icon" href="favicon.png" type="image/png">
<!-- Firebase App and Firestore Compatibility SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
    :root {
        --primary: #0d6efd;
        --primary-hover: #0b5ed7;
        --dark: #0d2f5f;
        --light-bg: #f5f2eb;
        --text-main: #333;
        --border: rgba(13, 47, 95, 0.08);
    }

    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f5f2eb; /* Warm premium beige */
        background-image: 
            linear-gradient(rgba(13, 47, 95, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(13, 47, 95, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        animation: moveGrid 16s linear infinite;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: var(--text-main);
    }

    @keyframes moveGrid {
        from { background-position: 0 0; }
        to { background-position: 40px 40px; }
    }

    .login-box {
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 15px 35px rgba(13, 47, 95, 0.08), 0 5px 15px rgba(0, 0, 0, 0.02);
        padding: 40px 35px;
        width: 100%;
        max-width: 400px;
        box-sizing: border-box;
        border: 1px solid var(--border);
        border-top: 5px solid var(--dark);
        animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .login-header {
        text-align: center;
        margin-bottom: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .brand-container {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 5px;
    }

    .volga-text {
        color: #0B3A5E;
    }

    .infosys-text {
        background: linear-gradient(90deg, #F05A28 0%, #F39C12 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
    }

    .login-header p {
        margin: 0;
        color: #777;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    /* Tabs */
    .tabs {
        display: flex;
        margin-bottom: 25px;
        background: var(--light-bg);
        border-radius: 10px;
        padding: 4px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    .tab {
        flex: 1;
        text-align: center;
        padding: 12px;
        cursor: pointer;
        border-radius: 8px;
        font-weight: bold;
        color: #555;
        font-size: 0.9rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        user-select: none;
    }

    .tab.active {
        background: var(--dark);
        color: #ffffff;
        box-shadow: 0 4px 12px rgba(13, 47, 95, 0.15);
    }

    /* Inputs */
    .input-group {
        margin-bottom: 22px;
        text-align: left;
    }

    .input-group label {
        display: block;
        font-size: 0.85rem;
        color: #444;
        margin-bottom: 8px;
        font-weight: 600;
    }

    .input-group input {
        width: 100%;
        padding: 12px 14px;
        background: #ffffff;
        border: 1.5px solid #dcdfe6;
        border-radius: 8px;
        color: var(--text-main);
        font-size: 0.95rem;
        outline: none;
        box-sizing: border-box;
        font-family: inherit;
        transition: all 0.2s ease;
    }

    .input-group input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.12);
    }

    /* Button */
    .btn-login {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--primary) 0%, #0d5dd6 100%);
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 12px rgba(13, 110, 253, 0.15);
    }

    .btn-login:hover {
        background: linear-gradient(135deg, var(--primary-hover) 0%, #0a52be 100%);
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(13, 110, 253, 0.25);
    }

    .btn-login:active {
        transform: translateY(0);
    }

    .error-msg {
        color: #dc3545;
        font-size: 0.85rem;
        text-align: center;
        margin-top: -12px;
        margin-bottom: 18px;
        display: none;
        font-weight: 600;
        background: rgba(220, 53, 69, 0.05);
        border: 1px solid rgba(220, 53, 69, 0.1);
        padding: 8px;
        border-radius: 6px;
    }

    .password-toggle-btn {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        color: #777;
        display: flex;
        align-items: center;
        justify-content: center;
        width: auto;
        height: auto;
        outline: none;
        transition: color 0.2s;
    }

    .password-toggle-btn:hover {
        color: var(--primary);
    }

    @media (max-width: 480px) {
        body {
            padding: 12px;
        }
        .login-box {
            padding: 28px 22px;
            border-radius: 12px;
        }
        .brand-container h1 {
            font-size: 1.5rem;
        }
        .login-header p {
            font-size: 0.75rem;
        }
        .tabs {
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 5px;
            font-size: 0.85rem;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group input {
            padding: 10px 12px;
            font-size: 0.9rem;
        }
        .error-message {
            margin-top: -8px;
            margin-bottom: 12px;
        }
        .btn-login {
            padding: 12px;
            font-size: 0.95rem;
        }
    }

    /* Loader Overlay */
    .loader-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .loader-overlay.active {
        opacity: 1;
        visibility: visible;
    }

    .loader-content {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .loader-spinner {
        animation: spin-pulse 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        margin-bottom: 20px;
    }

    @keyframes spin-pulse {
        0% { transform: scale(0.9) rotate(0deg); opacity: 0.7; }
        50% { transform: scale(1.1) rotate(180deg); opacity: 1; }
        100% { transform: scale(0.9) rotate(360deg); opacity: 0.7; }
    }

    .loader-content h2 {
        color: var(--dark);
        margin: 0 0 8px 0;
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: 0.5px;
    }

    .loader-content p {
        color: #666;
        margin: 0;
        font-size: 0.95rem;
        font-weight: 500;
    }
</style>
</head>
<body>

<!-- Loader Screen -->
<div id="loader-overlay" class="loader-overlay">
    <div class="loader-content">
        <div class="loader-spinner">
            <img src="favicon.png" alt="Loading Logo" style="width: 48px; height: 48px; object-fit: contain;">
        </div>
        <h2 id="loader-text">Authenticating...</h2>
        <p>Preparing your workspace</p>
    </div>
</div>

<div class="login-box">
    <div class="login-header">
        <div class="brand-container">
            <img src="favicon.png" alt="Volga Infosys Logo" style="width: 32px; height: 32px; object-fit: contain;">
            <h1 style="margin: 0; font-size: 1.8rem; font-weight: 800; letter-spacing: 0.5px;"><span class="volga-text">VOLGA</span><span class="infosys-text">INFOSYS</span></h1>
        </div>
        <p style="margin: 0; color: #8ba3b8; font-size: 1rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 5px;">Engine VR Project Tracker Portal</p>
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('user')" id="tab-user">User Login</div>
        <div class="tab" onclick="switchTab('admin')" id="tab-admin">Admin Login</div>
    </div>

    <div id="error" class="error-msg">Invalid Credentials</div>

    <div class="input-group">
        <label id="userid-label" for="userid">User ID</label>
        <input type="text" id="userid" placeholder="Enter your User ID" autocomplete="off">
    </div>

    <div class="input-group" id="pass-group" style="display: none;">
        <label for="pass">Password</label>
        <div style="position: relative;">
            <input type="password" id="pass" placeholder="Enter Admin Password" style="padding-right: 40px;">
            <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility()" title="Toggle Password Visibility">
                <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </button>
        </div>
    </div>

    <button class="btn-login" onclick="login()">Enter Dashboard</button>
    <footer style="margin-top: 25px; text-align: center; font-size: 0.8rem; color: #888; border-top: 1px solid rgba(13, 47, 95, 0.08); padding-top: 15px;">
        &copy; 2026 Volga Infosys Private Limited. All rights reserved.
    </footer>
</div>

<script>
    // 1. Session check (auto-bypass login if already logged in)
    if (sessionStorage.getItem('loggedIn') === 'true') {
        window.location.href = 'Engine_VR_Project_Tracker_Webpage.html';
    }

    // 2. Firebase Configuration - REPLACE WITH YOUR KEYS
    const firebaseConfig = {
      apiKey: "AIzaSyAKHrg6tNkdpnqU8a9r1DKs8oH4IvZcE04",
      authDomain: "enginevr-tracker.firebaseapp.com",
      projectId: "enginevr-tracker",
      storageBucket: "enginevr-tracker.firebasestorage.app",
      messagingSenderId: "538833317729",
      appId: "1:538833317729:web:326cf15f20c90a004ddf20",
      measurementId: "G-MC66PB301E"
    };

    // Initialize Firebase
    let db = null;
    if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
        } catch (e) {
            console.error("Firebase initialization failed:", e);
        }
    }

    // 3. Unified Database Layer
    const dbHelper = {
        async getUsers() {
            if (db) {
                try {
                    const snapshot = await db.collection('users').get();
                    return snapshot.docs.map(doc => ({ id: doc.id, displayName: doc.data().displayName || doc.id }));
                } catch (e) {
                    console.error("Firestore read failed, falling back to LocalStorage:", e);
                }
            }
            const storedUsers = localStorage.getItem('engineTrackerUsers');
            const raw = storedUsers ? JSON.parse(storedUsers) : [];
            return raw.map(u => typeof u === 'string' ? { id: u, displayName: u } : u);
        }
    };

    let currentRole = 'user';

    function switchTab(role) {
        currentRole = role;
        document.getElementById('error').style.display = 'none';
        document.getElementById('userid').value = '';
        document.getElementById('pass').value = '';

        if (role === 'admin') {
            document.getElementById('tab-admin').classList.add('active');
            document.getElementById('tab-user').classList.remove('active');
            document.getElementById('pass-group').style.display = 'block';
            document.getElementById('userid-label').innerText = 'Admin User ID';
            document.getElementById('userid').placeholder = 'Enter Admin User ID';
        } else {
            document.getElementById('tab-user').classList.add('active');
            document.getElementById('tab-admin').classList.remove('active');
            document.getElementById('pass-group').style.display = 'none';
            document.getElementById('userid-label').innerText = 'User ID';
            document.getElementById('userid').placeholder = 'Enter your User ID';
        }
    }

    async function login() {
        const userid = document.getElementById('userid').value.trim();
        const pass = document.getElementById('pass').value;
        const errorEl = document.getElementById('error');

        if (!userid) {
            errorEl.innerText = "Please enter your User ID";
            errorEl.style.display = 'block';
            return;
        }

        if (currentRole === 'admin') {
            if (userid === 'adminvolga' && pass === 'enginevradmin') {
                sessionStorage.setItem('loggedIn', 'true');
                sessionStorage.setItem('role', 'admin');
                sessionStorage.setItem('username', userid);
                
                showLoader(() => {
                    window.location.href = 'Engine_VR_Project_Tracker_Webpage.html';
                });
            } else {
                errorEl.innerText = "Invalid Admin Credentials";
                errorEl.style.display = 'block';
            }
        } else {
            // General User Login — match against private User ID
            try {
                const authUsers = await dbHelper.getUsers();
                const match = authUsers.find(u => u.id === userid);
                if (match) {
                    sessionStorage.setItem('loggedIn', 'true');
                    sessionStorage.setItem('role', 'user');
                    // Store the Display Name (not the User ID) for use in the tracker
                    sessionStorage.setItem('username', match.displayName);
                    
                    showLoader(() => {
                        window.location.href = 'Engine_VR_Project_Tracker_Webpage.html';
                    });
                } else {
                    errorEl.innerText = "Invalid User ID. Please contact an Admin.";
                    errorEl.style.display = 'block';
                }
            } catch (e) {
                console.error("Login verification failed:", e);
                errorEl.innerText = "Login error. Please try again.";
                errorEl.style.display = 'block';
            }
        }
    }

    function showLoader(callback) {
        const overlay = document.getElementById('loader-overlay');
        overlay.classList.add('active');
        
        // Dynamic text change for a premium feel
        setTimeout(() => {
            document.getElementById('loader-text').innerText = "Loading workspace...";
        }, 1200);

        // Redirect after delay
        setTimeout(() => {
            callback();
        }, 2500);
    }

    // Allow pressing Enter to login
    document.addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            login();
        }
    });

    function togglePasswordVisibility() {
        const passInput = document.getElementById('pass');
        const eyeIcon = document.getElementById('eye-icon');
        if (passInput.type === 'password') {
            passInput.type = 'text';
            eyeIcon.innerHTML = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
            `;
        } else {
            passInput.type = 'password';
            eyeIcon.innerHTML = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            `;
        }
    }
</script>

</body>
</html>
